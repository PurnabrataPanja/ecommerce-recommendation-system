{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>E-Commerce Recommendation System</title>

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
    body {
        font-family: 'Inter', sans-serif;
        background-color: #f8f9fa;
    }
    .main-wrapper {
    max-width: 1500px;
    margin: 0 auto;
}
/* Sidebar wrapper */
.sidebar-wrapper {
    position: sticky;
    top: 20px;
}

/* Category scroll only */
.category-scroll {
    max-height: 260px;
    overflow-y: auto;
}

/* Improve scroll appearance */
.category-scroll::-webkit-scrollbar {
    width: 6px;
}

.category-scroll::-webkit-scrollbar-thumb {
    background: #ccc;
    border-radius: 10px;
}
    .navbar-brand {
        font-weight: 700;
        letter-spacing: 0.5px;
    }

    .card {
        border: none;
        border-radius: 12px;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        height: 100%;
    }

    .card:hover {
        transform: translateY(-4px);
        box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    }

    /* ============================= */
    /* STANDARD PRODUCT IMAGE STYLE  */
    /* ============================= */

    .image-wrapper {
        height: 250px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #ffffff;
        overflow: hidden;
        border-radius: 8px;
    }

    .image-wrapper img {
        max-height: 100%;
        max-width: 100%;
        object-fit: contain;
    }

    /* Listing page image */
    .product-image {
        height: 200px;
        object-fit: contain;
        background: #ffffff;
        padding: 10px;
    }

    .price {
        font-weight: 600;
        font-size: 1.1rem;
    }

    .rating {
        font-size: 0.9rem;
        color: #f39c12;
    }
</style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm mb-4">
    <div class="container">

        <a class="navbar-brand" href="/">🛍 ShopSmart</a>

        <div class="collapse navbar-collapse">

            <!-- Center Search Bar -->
            <form class="d-flex mx-auto" method="GET" action="/products/">
                <input class="form-control me-2" type="search" name="search" placeholder="Search products..." style="width: 400px;">
                <button class="btn btn-dark" type="submit">Search</button>
            </form>

            <!-- Right Menu -->
            <ul class="navbar-nav ms-auto">
                {% if user.is_authenticated %}
                    <li class="nav-item">
                        <span class="nav-link">Hi, {{ user.username }}</span>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/products/">Products</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/cart/">Cart</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-danger" href="/accounts/logout/">Logout</a>
                    </li>
                {% else %}
                    <li class="nav-item">
                        <a class="nav-link" href="/accounts/login/">Login</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/accounts/register/">Register</a>
                    </li>
                {% endif %}
            </ul>

        </div>
    </div>
</nav>

<!-- MAIN CONTENT -->
<div class="container-fluid px-4 px-lg-5 mb-5 main-wrapper">
    {% block content %}{% endblock %}
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
